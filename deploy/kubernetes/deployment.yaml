apiVersion: apps/v1
kind: Deployment
metadata:
  name: kairosyn
  namespace: kairosyn
  labels:
    app: kairosyn
    version: "1.0.0"
    app.kubernetes.io/name: kairosyn
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: inference-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kairosyn
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime rolling deploy
  template:
    metadata:
      labels:
        app: kairosyn
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # ── Security context ──────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # ── Init: wait for GPU to be ready ────────────────────────────────────
      initContainers:
        - name: gpu-check
          image: nvidia/cuda:12.1.1-base-ubuntu22.04
          command: ["nvidia-smi"]
          resources:
            limits:
              nvidia.com/gpu: "1"

      # ── Main container ────────────────────────────────────────────────────
      containers:
        - name: kairosyn
          image: ghcr.io/or4cl3-ai-1/kairosyn-1:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Environment
          env:
            - name: KAIROSYN_CONFIG
              value: /app/configs/model/kairosyn_e4b.yaml
            - name: MODEL_CHECKPOINT
              valueFrom:
                secretKeyRef:
                  name: kairosyn-secrets
                  key: model-checkpoint
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kairosyn-secrets
                  key: hf-token
            - name: HF_HOME
              value: /app/.cache/huggingface
            - name: TRANSFORMERS_CACHE
              value: /app/.cache/huggingface
            - name: TOKENIZERS_PARALLELISM
              value: "false"
            - name: SESSION_TTL
              value: "7200"
            - name: MAX_SESSIONS
              value: "500"
            - name: PYTHONPATH
              value: /app

          # Resource requests and limits
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: "1"

          # Volume mounts
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
            - name: hf-cache
              mountPath: /app/.cache/huggingface
            - name: results
              mountPath: /app/results
            - name: tmp
              mountPath: /tmp

          # Probes
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 20    # Allow 5 min for model load
            successThreshold: 1
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10

          # Container security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: kairosyn-checkpoints-pvc
        - name: hf-cache
          persistentVolumeClaim:
            claimName: kairosyn-hf-cache-pvc
        - name: results
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      # ── Scheduling ────────────────────────────────────────────────────────
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      nodeSelector:
        accelerator: nvidia-gpu

      terminationGracePeriodSeconds: 60

      imagePullSecrets:
        - name: ghcr-pull-secret
