---
# Checkpoints PVC — stores trained model weights
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kairosyn-checkpoints-pvc
  namespace: kairosyn
  labels:
    app: kairosyn
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd          # Replace with your StorageClass
  resources:
    requests:
      storage: 200Gi

---
# Hugging Face model cache — avoids re-downloading Gemma 4 weights
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kairosyn-hf-cache-pvc
  namespace: kairosyn
  labels:
    app: kairosyn
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi                  # Gemma 4 E4B ~16GB, 26B MoE ~52GB (4-bit)
