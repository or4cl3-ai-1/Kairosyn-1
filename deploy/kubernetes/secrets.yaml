# ==============================================================================
# KAIROSYN-1 Kubernetes Secrets Template
# ==============================================================================
# ⚠️  DO NOT commit real values. Replace placeholders before applying.
#
# Apply with:
#   HF_TOKEN=hf_xxx kubectl apply -f secrets.yaml
#
# Or use external-secrets-operator / Vault / Sealed Secrets in production.
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: kairosyn-secrets
  namespace: kairosyn
  labels:
    app: kairosyn
type: Opaque
stringData:
  # Hugging Face token for Gemma 4 access
  hf-token: "REPLACE_WITH_HF_TOKEN"

  # Optional: path to fine-tuned checkpoint inside the PVC
  model-checkpoint: ""

  # Optional: Weights & Biases API key
  wandb-api-key: "REPLACE_WITH_WANDB_KEY"

---
# GitHub Container Registry pull secret
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: kairosyn
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "REPLACE_WITH_GITHUB_USERNAME",
          "password": "REPLACE_WITH_GITHUB_TOKEN",
          "auth": "REPLACE_WITH_BASE64_USERNAME_COLON_TOKEN"
        }
      }
    }
