global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'kairosyn-monitor'

scrape_configs:
  - job_name: 'kairosyn-server'
    static_configs:
      - targets: ['kairosyn:8080']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nvidia-dcgm'
    static_configs:
      - targets: ['nvidia-exporter:9400']
    scrape_interval: 15s

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
