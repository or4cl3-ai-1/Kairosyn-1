[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default markers to skip in fast runs
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

markers =
    gpu: requires CUDA GPU (deselect with '-m "not gpu"')
    slow: runs longer than 30 seconds (deselect with '-m "not slow"')
    integration: requires full Gemma 4 model load

# Timeout per test (seconds)
timeout = 120

# Log level during tests
log_cli = true
log_cli_level = WARNING
